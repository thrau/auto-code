name: Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'ready for agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please implement GitHub issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}

            Description:
            ${{ github.event.issue.body }}

            Instructions:
            1. Implement the feature or fix described in the issue
            2. Follow the existing code style and patterns in the repository
            3. Write appropriate tests if applicable
            4. Create a pull request with your changes that closes issue #${{ github.event.issue.number }}
          claude_args: --max-turns 10
